name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    # Public repo -> GitHub-hosted standard runners (free minutes for public repos).
    # We intentionally do NOT reuse the monorepo's `warp-*` self-hosted labels:
    # the org's Warp runner group is not guaranteed to include this repository,
    # and an unmatched runner label leaves the job queued indefinitely.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
